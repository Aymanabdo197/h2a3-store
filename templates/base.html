<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}متجر H2A3 Fortress{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <a href="{{ url_for('home') }}">الرئيسية</a>
        <a href="{{ url_for('products') }}">المنتجات</a>
        <a href="{{ url_for('cart') }}">السلة</a>
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('admin_dashboard') }}">لوحة التحكم</a>
            <a href="{{ url_for('logout') }}">خروج</a>
        {% else %}
            <a href="{{ url_for('login') }}">دخول</a>
        {% endif %}
    </nav>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
