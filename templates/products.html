{% extends "base.html" %}
{% block content %}
<h1>المنتجات</h1>
<div class="product-grid">
    {% for product in products %}
    <div class="product-card">
        <h3>{{ product.name }}</h3>
        <p>{{ product.description }}</p>
        <span class="price">{% if product.price == 0 %}مجاني{% else %}${{ "%.2f"|format(product.price) }}{% endif %}</span>
        <a href="{{ url_for('add_to_cart', product_id=product.id) }}" class="btn">أضف للسلة</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
