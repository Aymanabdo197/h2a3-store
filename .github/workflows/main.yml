name: Build H2A3 Fortress EXE
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller --onefile --windowed --name "H2A3-Fortress" --add-data "templates;templates" --add-data "static;static" app.py
      - uses: actions/upload-artifact@v4
        with:
          name: H2A3-Fortress-EXE
          path: dist/H2A3-Fortress.exe
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.0.0
          name: H2A3 Fortress v4.0.0
          files: dist/H2A3-Fortress.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
